name: Update publications

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate publications.json
        timeout-minutes: 12
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          NCBI_EMAIL: ${{ secrets.CROSSREF_MAILTO }}
          TARGET_AUTHOR: "Michael L. Platt"
          TARGET_ORCID: "0000-0003-3912-8821"
          MYNCBI_PUBLIC_URL: "https://www.ncbi.nlm.nih.gov/myncbi/plattlab/bibliography/public/"
          GOOGLE_SCHOLAR_PROFILE_URL: "https://scholar.google.com/citations?user=U9Hu2rcAAAAJ&hl=en"
          OUTPUT_FILE: "publications.json"
          REPORT_FILE: "publication_update_report.json"
          REQUEST_TIMEOUT: "12"
          MAX_CROSSREF_DOI_LOOKUPS: "80"
          ENABLE_CROSSREF_DOI_ENRICHMENT: "1"
          ENABLE_CROSSREF_NAME_FALLBACK: "0"
        run: python scripts/update_publications.py

      - name: Validate generated JSON files
        run: |
          python -m json.tool publications.json > /tmp/publications.json
          python -m json.tool publication_update_report.json > /tmp/publication_update_report.json

      - name: Commit and push changes
        run: |
          if git diff --quiet -- publications.json publication_update_report.json; then
            echo "No publication changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json publication_update_report.json
          git commit -m "Update publications"
          git push
